<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --black:#3B3127; --black2:#473B2D; --ink:#4A3F33;
  --pink:#8D744B; --pink-d:#6F5A38; --pink-soft:#F0E9DC;
  --yellow:#A98A4B; --yellow-d:#6F5A38; --yellow-soft:#F2EADA;
  --gray:#5A4D3F; --gray2:#6B5D4C; --gray-soft:#ECE6DC;
  --bg:#F4F0E8; --card:#FFFFFF; --line:#E3DCCF; --line2:#EFEAE0;
  --muted:#897C6B; --muted2:#B3A893;
  --active:#8D744B; --active-bg:#8D744B; --active-soft:#F0E9DC;
  --office:#5A4D3F; --office-soft:#ECE6DC;
  --done:#5E7B53; --done-soft:#E6EEE1;
  --visit:#B5652F; --visit-soft:#F6E7DA;
  --r:13px; --sh:0 1px 2px rgba(59,49,39,.07),0 4px 14px rgba(59,49,39,.07);
  --sh-lg:0 14px 44px rgba(59,49,39,.2);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14.5px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:'Archivo';margin:0;letter-spacing:-.01em}
.mono{font-family:'Roboto Mono',monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:14.5px;color:var(--ink)}
input:focus-visible,select:focus-visible,textarea:focus-visible,button:focus-visible{outline:2.5px solid var(--pink);outline-offset:1px}
::-webkit-scrollbar{height:10px;width:10px}::-webkit-scrollbar-thumb{background:#C6C6CD;border-radius:6px;border:2px solid var(--bg)}

.hdr{background:#fff;border-bottom:1px solid var(--line)}
.hdr-top{max-width:1180px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:16px}
.hdr-top img.logo{height:46px;width:auto;display:block}
.hdr .spacer{flex:1}
.hdr-accent{height:3px;background:linear-gradient(90deg,#A98A4B,#6F5A38);max-width:1180px;margin:0 auto}
.tabs{background:var(--black2)}
.tabs-in{max-width:1180px;margin:0 auto;padding:0 14px;display:flex;gap:2px;overflow-x:auto}
.tabs button{padding:13px 18px;color:#9A9AA3;font-weight:600;font-size:14px;border-bottom:3px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:8px}
.tabs button svg{width:17px;height:17px}
.tabs button:hover{color:#fff}
.tabs button.on{color:#fff;border-bottom-color:var(--pink)}
.tabs button .ct{font-family:'Roboto Mono';font-size:11px;background:rgba(255,255,255,.14);padding:1px 7px;border-radius:20px}
.tabs button.on .ct{background:var(--pink);color:#fff}
.wrap{max-width:1180px;margin:0 auto;padding:22px 24px 70px}

.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:9px;font-weight:600;font-size:13.5px;background:var(--card);border:1px solid var(--line);transition:.12s;white-space:nowrap}
.btn:hover{border-color:#BCBCC4;background:#FBFBFC}
.btn svg{width:16px;height:16px}
.btn.pink{background:var(--pink);border-color:var(--pink);color:#fff}
.btn.pink:hover{background:var(--pink-d);border-color:var(--pink-d)}
.btn.dark{background:var(--ink);border-color:var(--ink);color:#fff}
.btn.dark:hover{background:var(--gray)}
.btn.ghost{background:transparent;border-color:transparent}.btn.ghost:hover{background:#E2E2E8}
.btn.sm{padding:6px 11px;font-size:12.5px}
.btn.danger{color:var(--pink);border-color:var(--pink-soft)}.btn.danger:hover{background:var(--pink-soft)}

.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.toolbar h2{font-size:17px;font-weight:800}
.toolbar .grow{flex:1}
.search{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:0 12px;min-width:180px}
.search svg{width:16px;height:16px;color:var(--muted)}
.search input{border:none;outline:none;background:none;padding:9px 0;width:140px}
.fsel{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-weight:600;font-size:13px;color:var(--gray)}

.kstrip{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:11px;margin-bottom:18px}
.kbox{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:13px 15px;position:relative;overflow:hidden}
.kbox .sp{position:absolute;left:0;top:0;bottom:0;width:4px}
.kbox .kl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700}
.kbox .kv{font-family:'Archivo';font-weight:800;font-size:27px;line-height:1;margin-top:6px}

.pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.pill .dot{width:6px;height:6px;border-radius:50%}
.p-active{background:var(--active-soft);color:var(--active)} .p-active .dot{background:var(--active-bg)}
.p-office{background:var(--office-soft);color:var(--gray)} .p-office .dot{background:var(--gray)}
.p-done{background:var(--done-soft);color:var(--done)} .p-done .dot{background:var(--done)}
.p-visit{background:var(--visit-soft);color:var(--visit)} .p-visit .dot{background:var(--visit)}
.p-review{background:#F3EADA;color:#7C612C} .p-review .dot{background:#A98A4B}
.p-pending{background:#F3EADA;color:#7C612C} .p-pending .dot{background:#A98A4B}
.ap{font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.02em}
.ap-approved{background:var(--done-soft);color:var(--done)}
.ap-noted{background:var(--active-soft);color:var(--active)}
.ap-revise{background:var(--visit-soft);color:var(--visit)}
.ap-notapproved{background:var(--pink-soft);color:var(--pink-d)}
.ap-pending{background:var(--yellow-soft);color:var(--yellow-d)}

.tablewrap{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#fff;font-weight:700;padding:11px 13px;background:var(--ink);white-space:nowrap;position:sticky;top:0}
.tbl td{padding:11px 13px;border-bottom:1px solid var(--line2);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{cursor:pointer}
.tbl tbody tr:hover{background:#FBFBFC}
.hnum{font-family:'Roboto Mono';font-weight:700;font-size:14px;background:var(--ink);color:#fff;padding:3px 10px;border-radius:6px;display:inline-block;min-width:46px;text-align:center}
.scroll{overflow-x:auto}

.slist{display:flex;flex-direction:column;gap:10px}
.srow{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh);display:flex;gap:14px;align-items:flex-start;cursor:pointer;transition:.12s}
.srow:hover{border-color:#BCBCC4;box-shadow:var(--sh-lg)}
.srow.flag{border-left:4px solid var(--visit)}
.srow .stxt{flex:1;min-width:0}
.srow .sttl{font-size:13px;color:var(--muted);margin-bottom:4px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.srow .shead{font-weight:700;font-size:14px;color:var(--ink);text-transform:uppercase;letter-spacing:.01em;line-height:1.35;margin-bottom:3px}
.srow .sbody{font-size:13.5px;line-height:1.5;color:var(--gray2)}
.srow .sbody.empty{color:var(--muted2);font-style:italic}
.vbtn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:700;color:var(--muted);padding:6px 9px;border-radius:9px;border:1px solid var(--line)}
.vbtn svg{width:18px;height:18px}
.vbtn.on{background:var(--visit-soft);color:var(--visit);border-color:var(--visit)}
.progress{height:8px;background:var(--line2);border-radius:999px;overflow:hidden;min-width:90px}
.progress b{display:block;height:100%;background:var(--done);border-radius:999px}
.meta{font-size:12.5px;color:var(--muted);line-height:1.45;margin-top:5px}
.section-title{font-size:12px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.04em;margin:18px 0 10px;padding-top:14px;border-top:1px solid var(--line2)}

.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
.acard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;cursor:pointer;transition:.12s}
.acard:hover{border-color:var(--pink);box-shadow:var(--sh-lg);transform:translateY(-2px)}
.acard .ah{background:var(--ink);color:#fff;padding:13px 16px;display:flex;align-items:center;gap:10px}
.acard .ah .hnum{background:var(--pink);color:#fff}
.acard .ab{padding:14px 16px}
.acard .arow{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--line2)}
.acard .arow:last-child{border-bottom:none}
.acard .arow .l{color:var(--muted);font-weight:500}
.acard .arow .v{font-weight:600;text-align:right}

.photo-tools{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:6px 0 12px}
.photo-help{font-size:12px;color:var(--muted);margin-top:-6px;margin-bottom:10px}
.photo-input{position:relative;overflow:hidden}
.photo-input input{position:absolute;inset:0;opacity:0;cursor:pointer}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:10px}
.photo-card{background:var(--card);border:1px solid var(--line);border-radius:11px;overflow:hidden;box-shadow:var(--sh)}
.photo-card img{width:100%;height:105px;object-fit:cover;display:block;background:#f3f0ea}
.photo-card .pcap{padding:8px}
.photo-card .pcap input{width:100%;border:1px solid var(--line);border-radius:7px;padding:7px 8px;font-size:12.5px}
.photo-card .pact{display:flex;gap:6px;margin-top:7px;align-items:center;justify-content:space-between}
.photo-card .pmeta{font-size:10.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.photo-card .remove{font-size:11px;font-weight:700;color:var(--pink-d);border:1px solid var(--pink-soft);border-radius:7px;padding:4px 7px;background:#fff}
.photo-card .remove:hover{background:var(--pink-soft)}

.empty{text-align:center;padding:54px 20px;color:var(--muted)}
.empty .ico{width:56px;height:56px;border-radius:16px;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;margin:0 auto 14px}
.empty .ico svg{width:26px;height:26px;color:var(--muted2)}
.empty h4{font-size:16px;color:var(--ink);margin-bottom:5px}
.empty p{font-size:13.5px;max-width:360px;margin:0 auto 16px}

.overlay{position:fixed;inset:0;background:rgba(11,11,12,.55);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:30px 14px;overflow-y:auto;animation:fade .15s}
@keyframes fade{from{opacity:0}}
.modal{background:var(--bg);border-radius:18px;width:100%;max-width:620px;box-shadow:var(--sh-lg);animation:pop .2s;margin:auto 0}
@keyframes pop{from{transform:translateY(12px) scale(.98);opacity:0}}
.mh{position:sticky;top:0;z-index:2;background:var(--black);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px;border-radius:18px 18px 0 0;border-bottom:3px solid var(--pink)}
.mh h3{font-size:17px;font-weight:800;flex:1}
.mh .x{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;background:rgba(255,255,255,.12)}
.mh .x:hover{background:rgba(255,255,255,.22)}
.mb{padding:20px}
.mf{position:sticky;bottom:0;background:var(--bg);padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;border-radius:0 0 18px 18px}

.field{margin-bottom:15px}
.field label,.flabel{display:block;font-size:12px;font-weight:700;color:var(--gray);margin-bottom:6px;text-transform:uppercase;letter-spacing:.03em}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:var(--card);transition:.12s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--pink);outline:none;box-shadow:0 0 0 3px var(--pink-soft)}
.field textarea{resize:vertical;min-height:80px;line-height:1.55}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chipset{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:8px 13px;border-radius:8px;border:1.5px solid var(--line);background:var(--card);font-size:13px;font-weight:600;color:var(--gray)}
.chip:hover{border-color:#BCBCC4}
.chip.on{border-color:var(--pink);background:var(--pink-soft);color:var(--pink-d)}
.chip.on.p-active{border-color:var(--active-bg);background:var(--active-soft);color:var(--active)}
.chip.on.p-office{border-color:var(--gray);background:var(--office-soft);color:var(--gray)}
.chip.on.p-done{border-color:var(--done);background:var(--done-soft);color:var(--done)}
.chip.on.ap-approved{border-color:var(--done);background:var(--done-soft);color:var(--done)}
.chip.on.ap-noted{border-color:var(--active-bg);background:var(--active-soft);color:var(--active)}
.chip.on.ap-revise{border-color:var(--visit);background:var(--visit-soft);color:var(--visit)}
.chip.on.ap-notapproved{border-color:var(--pink-d);background:var(--pink-soft);color:var(--pink-d)}
.toggle{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--card);border:1px solid var(--line);border-radius:9px;cursor:pointer;font-weight:600;font-size:13.5px}
.toggle .sw{width:40px;height:23px;border-radius:20px;background:var(--line);position:relative;transition:.15s;flex-shrink:0}
.toggle .sw::after{content:'';position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#fff;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on .sw{background:var(--pink)}.toggle.on .sw::after{left:19px}

.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:14px}
.legend span{display:flex;align-items:center;gap:5px}
.legend i{width:11px;height:11px;border-radius:3px;display:inline-block}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:11px;font-weight:600;font-size:13.5px;z-index:200;box-shadow:var(--sh-lg);opacity:0;transition:.25s;display:flex;align-items:center;gap:9px}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast svg{width:17px;height:17px;color:var(--yellow)}

@media(max-width:720px){
  .wrap{padding:16px 14px 80px}.two{grid-template-columns:1fr}
  .hdr-top img.logo{height:42px}.hdr-top{padding:12px 16px}
  .toolbar h2{width:100%}
}
@media print{.hdr,.tabs,.hdr-accent,.toolbar,.toast,.kstrip,.no-print{display:none!important}body{background:#fff}.wrap{padding:0}}
</style>

function recordTime(h){
  const raw=h.updatedAt||h.statusDate||h.createdAt||h.date||'';
  const t=Date.parse(raw);
  return Number.isFinite(t)?t:null;
}
function newestFirst(list){
  return list.map((h,i)=>({h,i})).sort((a,b)=>{
    const ta=recordTime(a.h),tb=recordTime(b.h);
    if(ta!==null||tb!==null){
      const diff=(tb??0)-(ta??0);
      if(diff)return diff;
    }
    return b.i-a.i;
  }).map(x=>x.h);
}

function resizeImageFile(file,maxDim=1400,quality=.82){
  return new Promise((resolve,reject)=>{
    if(!file.type.startsWith('image/')){reject(new Error('Not an image'));return;}
    const fr=new FileReader();
    fr.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.naturalWidth||img.width,h=img.naturalHeight||img.height;
        const scale=Math.min(1,maxDim/Math.max(w,h));
        const cw=Math.max(1,Math.round(w*scale)),ch=Math.max(1,Math.round(h*scale));
        const canvas=document.createElement('canvas');canvas.width=cw;canvas.height=ch;
        const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,cw,ch);
        resolve({src:canvas.toDataURL('image/jpeg',quality),caption:'',name:file.name||'site-photo.jpg',date:new Date().toISOString()});
      };
      img.onerror=()=>reject(new Error('Image load failed'));
      img.src=fr.result;
    };
    fr.onerror=()=>reject(fr.error||new Error('Read failed'));
    fr.readAsDataURL(file);
  });
}

function kpis(){
  const a=H.filter(h=>h.status==='active').length,r=H.filter(h=>h.status==='review').length,o=H.filter(h=>h.status==='office').length,d=H.filter(h=>h.status==='done').length,v=H.filter(h=>h.needsVisit).length;

  </div>`;
}
function filtered(){
  let l=[...H];
  if(filter.q){const q=filter.q.toLowerCase();l=l.filter(h=>(h.number+' '+(h.projectName||'')+' '+h.type+' '+(h.statusHead||'')+' '+h.statusText+' '+h.comments+' '+(h.ownerName||'')+' '+(h.generalContractor||'')).toLowerCase().includes(q));}
  if(filter.status)l=l.filter(h=>h.status===filter.status);
  if(filter.approval)l=l.filter(h=>h.approval===filter.approval);
  return newestFirst(l);
}
function statusPill(k){return `<span class="pill p-${k}"><span class="dot"></span>${stLbl(k)}</span>`;}

function opt(arr,sel){return arr.map(o=>{const[v,l]=Array.isArray(o)?o:[o,o];return `<option value="${esc(v)}" ${sel===v?'selected':''}>${esc(l)}</option>`;}).join('');}

  },
  pick(btn,group,val){const w=btn.parentElement;w.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));btn.classList.add('on');mState[group]=val;},
  tog(key,elId){mState[key]=!mState[key];document.getElementById(elId).classList.toggle('on',mState[key]);},

  async addPhotos(input){
    const files=[...(input.files||[])];
    if(!files.length)return;
    collectPhotoCaptions();
    Toast.show('Adding '+files.length+' image'+(files.length>1?'s':''));
    for(const file of files){
      try{mPhotos.push(await resizeImageFile(file));}
      catch(e){Toast.show('Could not add '+(file.name||'image'),true);}
    }
    input.value='';
    document.getElementById('photo-preview').innerHTML=photoPreview(mPhotos);
  },
  removePhoto(i){
    collectPhotoCaptions();
    mPhotos.splice(i,1);
    document.getElementById('photo-preview').innerHTML=photoPreview(mPhotos);
  },
  clearPhotos(){
    if(mPhotos.length && !confirm('Remove all images from this house record?'))return;
    mPhotos=[];
    document.getElementById('photo-preview').innerHTML=photoPreview(mPhotos);
  },
  async save(id){
    const g=k=>document.getElementById('f-'+k)?.value??'';
    const num=g('number').trim();if(!num){Toast.show('House number required',true);return;}
    collectPhotoCaptions();
    const now=new Date().toISOString();
    const existing=id?H.find(x=>x.id===id):null;
    const rec={number:num,projectName:g('projectName').trim(),type:g('type').trim(),status:mState.status||'active',approval:mState.approval||'',fence:mState.fence||'',fenceDetail:g('fenceDetail').trim(),bond:g('bond'),additionalTime:!!mState.additionalTime,comments:g('comments').trim(),statusHead:g('statusHead').trim(),statusText:g('statusText').trim(),needsVisit:!!mState.needsVisit,completion:pct(g('completion')),ownerName:g('ownerName').trim(),ownerPhone:g('ownerPhone').trim(),ownerEmail:g('ownerEmail').trim(),generalContractor:g('generalContractor').trim(),contractorPhone:g('contractorPhone').trim(),permit:g('permit').trim(),startDate:g('startDate'),targetCompletion:g('targetCompletion'),createdAt:existing?.createdAt||now,updatedAt:now,statusDate:now,photos:mPhotos.map(p=>({...p}))};
    if(id){const i=H.findIndex(x=>x.id===id);rec.id=id;H[i]=rec;}else{rec.id=uid();H.push(rec);}
    await Store.set(H);this.close();render();Toast.show(id?'House updated':'House added');
  },
  async del(id){if(!confirm('Delete this house from all views?'))return;H=H.filter(x=>x.id!==id);await Store.set(H);this.close();render();Toast.show('House deleted');},
  async toggleVisit(id){const h=H.find(x=>x.id===id);h.needsVisit=!h.needsVisit;const now=new Date().toISOString();h.updatedAt=now;h.statusDate=now;await Store.set(H);render();Toast.show(h.needsVisit?'Flagged — follow-up/final inspection':'Follow-up flag cleared');},
  exportData(){
    const blob=new Blob([JSON.stringify(H,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='dorado-beach-tracker-'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);
    Toast.show('Exported '+H.length+' houses');
  },
  importData(input){
    const f=input.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=async e=>{
      try{
        const data=JSON.parse(e.target.result);
        if(!Array.isArray(data))throw 0;
        if(!confirm('Replace current data with '+data.length+' houses from this file? Your current data will be overwritten.')){input.value='';return;}
        H=migrate(data);await Store.set(H);render();Toast.show('Imported '+H.length+' houses');
      }catch(err){Toast.show('Invalid file',true);}
      input.value='';
    };
    r.readAsText(f);
  },
  printReport(id){
    let h=H.find(x=>x.id===id);
    // If the house edit form is open, use the current unsaved form values/photos too.
    // This prevents newly uploaded images from being missing when Generate Report is clicked before Save.
    const formOpen=!!document.getElementById('f-number');
    if(formOpen && h){
      const g=k=>document.getElementById('f-'+k)?.value??'';
      collectPhotoCaptions();
      h={...h,
        number:g('number').trim()||h.number,
        projectName:g('projectName').trim(),
        type:g('type').trim(),
        status:mState.status||h.status||'active',
        approval:mState.approval||h.approval||'',
        fence:mState.fence||h.fence||'',
        fenceDetail:g('fenceDetail').trim(),
        bond:g('bond'),
        additionalTime:!!mState.additionalTime,
        comments:g('comments').trim(),
        statusHead:g('statusHead').trim(),
        statusText:g('statusText').trim(),
        needsVisit:!!mState.needsVisit,
        completion:pct(g('completion')),
        ownerName:g('ownerName').trim(),
        ownerPhone:g('ownerPhone').trim(),
        ownerEmail:g('ownerEmail').trim(),
        generalContractor:g('generalContractor').trim(),
        contractorPhone:g('contractorPhone').trim(),
        permit:g('permit').trim(),
        startDate:g('startDate'),
        targetCompletion:g('targetCompletion'),
        photos:mPhotos.map(p=>({...p}))
      };
    }
    if(!h){Toast.show('House not found',true);return;}
    const today=new Date();
    const todayStr=today.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
    const reportNo='DBE-RPT-'+String(h.number||'HOUSE').replace(/\W+/g,'')+'-'+today.toISOString().slice(0,10).replaceAll('-','');
    const val=v=>esc(v||'—');
    const multi=v=>esc(v||'').replace(/\n/g,'<br>')||'—';
    const row=(l,v)=>`<tr><th>${l}</th><td>${v}</td></tr>`;
    const recommendation=h.status==='done'
      ? 'Project appears ready for closeout review, subject to final ARB confirmation.'
      : 'Keep project active. Bond/deposit release is not recommended until final completion, compliance items, restoration, and cleanup are verified.';
    const photos=Array.isArray(h.photos)?h.photos:[];
    const photoLog=photos.length?`<div class="photos">${photos.map((p,i)=>`<div class="photo"><img src="${p.src}"><div class="cap"><b>Photo ${i+1}</b>${p.caption?' — '+esc(p.caption):''}</div></div>`).join('')}</div>`:'Attach current site photos, approved drawings, ARB correspondence, and prior inspection report as applicable.';
    const html=`<!doctype html><html><head><meta charset="utf-8"><title>Inspection Report - House ${val(h.number)}</title>
    <style>
      @page{size:letter;margin:.55in}*{box-sizing:border-box}body{font-family:Arial,Helvetica,sans-serif;color:#222;margin:0;background:#f5f1ea}.sheet{max-width:820px;margin:0 auto;background:white;min-height:100vh;padding:34px 40px}.top{display:flex;justify-content:space-between;gap:24px;border-bottom:4px solid #8D744B;padding-bottom:16px;margin-bottom:22px}.logoRow{display:flex;align-items:center;gap:13px}.logoRow .dbe{height:58px;width:auto}.logoRow .by{font-size:12px;color:#6b5d4c;font-weight:700}.logoRow .fmg{height:44px;width:auto}.brand{font-weight:800;font-size:18px;letter-spacing:.04em;color:#3B3127;margin-top:10px}.sub{font-size:12px;color:#6b5d4c;margin-top:4px}.rpt{text-align:right;font-size:12px;line-height:1.6}.title{font-size:24px;font-weight:800;color:#3B3127;margin:0 0 4px}.badge{display:inline-block;background:#F0E9DC;color:#6F5A38;font-weight:700;border-radius:999px;padding:4px 10px;font-size:12px;margin-top:6px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0}.card{border:1px solid #e3dccf;border-radius:12px;padding:14px;background:#fff}.card h3{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:#6F5A38;margin:0 0 10px}table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;width:38%;color:#6b5d4c;font-weight:700;padding:6px 8px;border-bottom:1px solid #efeae0;vertical-align:top}td{padding:6px 8px;border-bottom:1px solid #efeae0;vertical-align:top}.section{margin-top:16px}.section h3{background:#3B3127;color:white;margin:0;padding:9px 12px;border-radius:8px 8px 0 0;font-size:13px;text-transform:uppercase;letter-spacing:.04em}.box{border:1px solid #e3dccf;border-top:none;border-radius:0 0 8px 8px;padding:13px;line-height:1.55;font-size:13.5px;min-height:54px}.pct{height:11px;background:#ece6dc;border-radius:20px;overflow:hidden;margin-top:5px}.pct b{display:block;height:100%;background:#8D744B;width:${pct(h.completion)}%}.photos{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.photo{border:1px solid #e3dccf;border-radius:10px;overflow:hidden;break-inside:avoid;background:#fff}.photo img{width:100%;height:220px;object-fit:cover;display:block}.photo .cap{font-size:12px;line-height:1.4;padding:8px 10px;color:#3B3127}.sig{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:42px;font-size:12px}.line{border-top:1px solid #222;padding-top:7px}.signatureName{font-family:'Brush Script MT','Segoe Script','Lucida Handwriting',cursive;font-size:28px;line-height:1;color:#1f2933;margin-bottom:8px}.sigdate{font-size:12px;color:#6b5d4c;margin-bottom:7px}.actions{position:fixed;right:18px;top:18px;display:flex;gap:8px}.actions button{border:1px solid #d7d0c3;background:white;border-radius:8px;padding:8px 12px;font-weight:700;cursor:pointer}@media print{body{background:white}.sheet{padding:0;max-width:none}.actions{display:none}.top{margin-top:0}.card{break-inside:avoid}.section{break-inside:avoid}}</style></head><body>
    <div class="actions"><button onclick="window.print()">Print / Save PDF</button><button onclick="window.close()">Close</button></div>
    <main class="sheet">
      <div class="top"><div><div class="logoRow"><img class="dbe" src="${DBE_LOGO}" alt="Dorado Beach East"><img class="fmg" src="${FMG_LOGO}" alt="FMG On-Site"></div><div class="brand">Dorado Beach East</div><div class="sub">Construction / ARB Inspection Tracker</div></div><div class="rpt"><b>Report No.</b> ${reportNo}<br><b>Date</b> ${todayStr}<br><b>Inspector</b> ${esc(INSPECTOR_NAME)}</div></div>
      <h1 class="title">Inspection Report — House ${val(h.number)}</h1>
      <div class="badge">${val(stLbl(h.status))} · ${pct(h.completion)}% complete</div>
      <div class="grid">
        <div class="card"><h3>Project Information</h3><table>
          ${row('Residence / Project',val(h.projectName))}
          ${row('Construction Type',val(h.type))}
          ${row('Owner',val(h.ownerName))}
          ${row('Owner Contact',[h.ownerPhone,h.ownerEmail].filter(Boolean).map(esc).join('<br>')||'—')}
          ${row('General Contractor',val(h.generalContractor))}
          ${row('Permit / Ref.',val(h.permit))}
        </table></div>
        <div class="card"><h3>ARB / Bond Status</h3><table>
          ${row('ARB Rating',val(apLbl(h.approval)||'Not set'))}
          ${row('Bond / Deposit',fmtBond(h.bond))}
          ${row('Construction Fence',h.fence==='required'?'Required'+(h.fenceDetail?' — '+val(h.fenceDetail):''):h.fence==='notrequired'?'Not required':'N/A')}
          ${row('Additional Time',h.additionalTime?'Yes':'No')}
          ${row('Follow-up Flag',h.needsVisit?'Yes — follow-up/final inspection':'No')}
          ${row('Completion',`${pct(h.completion)}%<div class="pct"><b></b></div>`)}
        </table></div>
      </div>
      <div class="section"><h3>Current Status</h3><div class="box"><b>${val(h.statusHead||'Status update')}</b><br>${multi(h.statusText)}</div></div>
      <div class="section"><h3>ARB Comments / Compliance Notes</h3><div class="box">${multi(h.comments)}</div></div>
      <div class="section"><h3>Inspector Recommendation</h3><div class="box">${esc(recommendation)}</div></div>
      <div class="section"><h3>Photo / Attachment Log</h3><div class="box">${photoLog}</div></div>
      <div class="sig"><div><div class="signatureName">${esc(INSPECTOR_NAME)}</div><div class="sigdate">${todayStr}</div><div class="line">Inspector signature / date</div></div><div class="line">ARB / Administration review</div></div>
    </main></body></html>`;
    const w=window.open('','_blank');if(!w){Toast.show('Allow pop-ups to generate report',true);return;}
    w.document.write(html);w.document.close();w.focus();
  },
  printApproval(id){
    const h=H.find(x=>x.id===id);const ck=on=>on?'☑':'☐';
    const html=`<div style="font-family:Georgia,serif;max-width:660px;margin:0 auto;padding:40px;color:#111">
      <div style="text-align:center;margin-bottom:26px"><div style="font-weight:bold;font-size:15px;font-style:italic">DORADO BEACH EAST HOMEOWNERS' ASSOCIATION, INC.</div><div style="font-weight:bold;font-size:14px;font-style:italic">ARCHITECTURAL REVIEW BOARD</div><div style="font-weight:bold;font-size:13px;font-style:italic">APPROVAL FOR CONSTRUCTION AND/OR ALTERATIONS</div></div>
      <p style="font-size:13px;line-height:1.7">The Architectural Review Board of <b>DORADO BEACH EAST HOMEOWNERS ASSOCIATION, INC.</b> hereby informs you that on ________ 2026 the proposed modifications, alterations, or renovations on <b>House Number ${esc(h.number)}</b> of the Dorado Beach East development, described below:</p>
      <p style="font-size:13px;margin:14px 0 4px"><b>${esc(h.projectName)||'House '+esc(h.number)}</b><br>${esc(h.type)||'—'}<br><span style="font-family:monospace">Completion: ${pct(h.completion)}%</span></p>
      <p style="font-size:13px">Were revised by the Board as follows:</p>
      <table style="width:100%;margin-top:18px;font-size:13px"><tr style="vertical-align:top">
        <td style="width:50%"><div style="font-weight:bold;border:1px solid #000;padding:4px 8px;display:inline-block;margin-bottom:10px">APPROVAL RATING:</div><div style="line-height:2">${ck(h.approval==='approved')} <b>APPROVED</b><br>${ck(h.approval==='noted')} <b>APPROVED AS NOTED</b><br>${ck(h.approval==='revise')} <b>REVISE &amp; RESUBMIT</b><br>${ck(h.approval==='notapproved')} <b>NOT APPROVED</b></div></td>
        <td style="width:50%"><div style="font-weight:bold;border:1px solid #000;padding:4px 8px;display:inline-block;margin-bottom:10px">SPECIAL CONSTRUCTIONS:</div><div style="line-height:1.9">${ck(h.fence==='required')} CONSTRUCTION FENCE REQUIRED <span style="font-size:10px">(Pebble Mosaic, Color)</span><br>${ck(h.fence==='notrequired')} CONSTRUCTION FENCE NOT REQUIRED<br>${ck(h.additionalTime)} ADDITIONAL TIME FOR CONSTRUCTION</div><div style="margin-top:14px;font-weight:bold">BOND / DEPOSIT</div><div style="line-height:1.8">${BONDS.map(b=>`${ck(h.bond===b)} ${fmtBond(b)}`).join('<br>')}</div></td>
      </tr></table>
      <div style="font-weight:bold;border:1px solid #000;padding:4px 8px;display:inline-block;margin:22px 0 10px">COMMENTS:</div>
      <div style="font-size:13px;line-height:1.7;min-height:60px">${esc(h.comments)||''}</div></div>`;
    const w=window.open('','_blank');if(!w){Toast.show('Allow pop-ups to print',true);return;}
    w.document.write(html);w.document.close();w.focus();setTimeout(()=>w.print(),250);
  },
};
init();
document.addEventListener('keydown',e=>{if(e.key==='Escape')App.close();});
</script>
